# SIGINT-01 // HYPRLAND BASE CONFIG
monitor=,preferred,auto,1
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 2 && hyprctl dispatch renameworkspace 1 ALPHA && hyprctl dispatch renameworkspace 2 MIKE && hyprctl dispatch renameworkspace 3 DELTA && hyprctl dispatch renameworkspace 4 ECHO

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1
    col.active_border = 0xff2A6080
    col.inactive_border = 0xff0F1E2B
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 0
    active_opacity = 0.95
    inactive_opacity = 0.75
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }
}

animations {
    enabled = true

    bezier = ops, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 4, ops, slide
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 6, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, ops, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# KEYBINDS
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, thunar
bind = $mod, V, togglefloating
bind = $mod, R, exec, rofi -show drun
bind = $mod, F, fullscreen
bind = $mod, L, exec, hyprlock

# workspace switching
bind = $mod, 1, exec, ~/.config/hypr/wallpaper.sh 1
bind = $mod, 1, workspace, 1
bind = $mod, 2, exec, ~/.config/hypr/wallpaper.sh 2
bind = $mod, 2, workspace, 2
bind = $mod, 3, exec, ~/.config/hypr/wallpaper.sh 3
bind = $mod, 3, workspace, 3
bind = $mod, 4, exec, ~/.config/hypr/wallpaper.sh 4
bind = $mod, 4, workspace, 4

# move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

# window focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# screenshot
bind = , Print, exec, flameshot gui

# volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# WORKSPACE LABELS
workspace = 1, name:ALPHA, persistent:true
workspace = 2, name:MIKE, persistent:true
workspace = 3, name:DELTA, persistent:true
workspace = 4, name:ECHO, persistent:true

